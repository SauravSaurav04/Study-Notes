<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 1: Java Fundamentals - Interactive MCQ Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #495057;
            margin-top: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .quiz-content {
            padding: 30px;
        }

        .section-title {
            font-size: 20px;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .question-card {
            background: #ffffff;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .question-card.answered-correct {
            border-color: #28a745;
            background: #f0fff4;
        }

        .question-card.answered-wrong {
            border-color: #dc3545;
            background: #fff5f5;
        }

        .question-number {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .options {
            display: grid;
            gap: 12px;
        }

        .option {
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            display: flex;
            align-items: center;
            font-size: 16px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .option.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option.correct {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }

        .option.wrong {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .option.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .option-label {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 15px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .option.correct .option-label,
        .option.wrong .option-label {
            background: rgba(255, 255, 255, 0.3);
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.wrong {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .result-modal.show {
            display: flex;
        }

        .result-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .result-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2d3748;
        }

        .result-score {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .result-details {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .result-detail-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 16px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 22px;
            }

            .stats {
                flex-direction: column;
                gap: 15px;
            }

            .quiz-content {
                padding: 20px;
            }

            .question-text {
                font-size: 16px;
            }

            .option {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Part 1: Java Fundamentals - Interactive MCQ Quiz</h1>
            <p>Test your knowledge with 130 comprehensive questions</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Progress</div>
                <div class="stat-value" id="progressStat">0/130</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Correct</div>
                <div class="stat-value" id="correctStat" style="color: #28a745;">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Wrong</div>
                <div class="stat-value" id="wrongStat" style="color: #dc3545;">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="scoreStat">0%</div>
            </div>
        </div>

        <div class="quiz-content">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterQuestions('all')">All Questions</button>
                <button class="filter-btn" onclick="filterQuestions('unanswered')">Unanswered</button>
                <button class="filter-btn" onclick="filterQuestions('correct')">Correct</button>
                <button class="filter-btn" onclick="filterQuestions('wrong')">Wrong</button>
            </div>

            <div id="questionsContainer"></div>
        </div>

        <div class="navigation">
            <button class="btn btn-secondary" onclick="resetQuiz()">🔄 Reset Quiz</button>
            <button class="btn btn-primary" onclick="showResults()">📊 Show Results</button>
        </div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-icon" id="resultIcon">🎉</div>
            <div class="result-title" id="resultTitle">Quiz Complete!</div>
            <div class="result-score" id="resultScore">0%</div>
            <div class="result-details">
                <div class="result-detail-item">
                    <span>Total Questions:</span>
                    <strong>130</strong>
                </div>
                <div class="result-detail-item">
                    <span>Answered:</span>
                    <strong id="resultAnswered">0</strong>
                </div>
                <div class="result-detail-item">
                    <span>Correct:</span>
                    <strong style="color: #28a745;" id="resultCorrect">0</strong>
                </div>
                <div class="result-detail-item">
                    <span>Wrong:</span>
                    <strong style="color: #dc3545;" id="resultWrong">0</strong>
                </div>
                <div class="result-detail-item">
                    <span>Performance:</span>
                    <strong id="resultPerformance">-</strong>
                </div>
            </div>
            <button class="btn btn-primary" onclick="closeResults()">Continue Quiz</button>
        </div>
    </div>

            // Section F: Strings (Q101-Q130)
            { section: "Strings", question: "Is String a primitive data type?", options: ["Yes", "No", "Sometimes", "Depends on usage"], answer: 1 },

            { section: "Strings", question: "What does substring(2, 5) do?", options: ["Returns characters from index 2 to 5", "Returns characters from index 2 to 4", "Returns 3 characters starting from index 2", "Returns characters from index 2 to end"], answer: 1 },

            { section: "Strings", question: "What does split(\" \") do?", options: ["Splits string into characters", "Splits string into words", "Removes spaces", "Compilation error"], answer: 1 },

            { section: "Strings", question: "What is the output of: \"Java\".replace('a', 'o')?", options: ["Jovo", "Jova", "Java", "Compilation error"], answer: 0 },
            { section: "Strings", question: "What does isEmpty() check?", options: ["If string is null", "If length is 0", "If string has spaces", "If string has characters"], answer: 1 },
            { section: "Strings", question: "What does startsWith(\"He\") check?", options: ["If string ends with \"He\"", "If string starts with \"He\"", "If string contains \"He\"", "If string equals \"He\""], answer: 1 },
            { section: "Strings", question: "What is the output of: \"Hello\".compareTo(\"Hello\")?", options: ["true", "false", "0", "1"], answer: 2 },

            { section: "Strings", question: "When should you use StringBuffer?", options: ["Single-threaded environment", "Multi-threaded environment", "For constant strings", "Never"], answer: 1 },
            { section: "Strings", question: "What happens when StringBuilder capacity is exceeded?", options: ["Exception", "Automatically increases: (old * 2) + 2", "Truncates string", "Compilation error"], answer: 1 },
            { section: "Strings", question: "What does equalsIgnoreCase() do?", options: ["Compares strings case-sensitively", "Compares strings ignoring case", "Converts to same case", "Checks if string has uppercase"], answer: 1 },
            { section: "Strings", question: "Why is String immutable?", options: ["Security", "Thread safety", "String Pool efficiency", "All of the above"], answer: 3 },
            { section: "Strings", question: "What is the output of: \"Hello\" + \"World\"?", options: ["HelloWorld", "Hello World", "Hello+World", "Compilation error"], answer: 0 }
        ];

        let userAnswers = new Array(quizData.length).fill(null);
        let currentFilter = 'all';

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            let currentSection = '';
            quizData.forEach((q, index) => {
                // Filter logic
                if (currentFilter === 'unanswered' && userAnswers[index] !== null) return;
                if (currentFilter === 'correct' && (userAnswers[index] === null || userAnswers[index] !== q.answer)) return;
                if (currentFilter === 'wrong' && (userAnswers[index] === null || userAnswers[index] === q.answer)) return;

                // Section header
                if (q.section !== currentSection) {
                    currentSection = q.section;
                    const sectionDiv = document.createElement('div');
                    sectionDiv.className = 'section-title';
                    sectionDiv.textContent = '📚 ' + currentSection;
                    container.appendChild(sectionDiv);
                }

                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-card';
                
                if (userAnswers[index] !== null) {
                    questionDiv.className += userAnswers[index] === q.answer ? ' answered-correct' : ' answered-wrong';
                }

                const questionNumber = document.createElement('div');
                questionNumber.className = 'question-number';
                questionNumber.textContent = `Question ${index + 1}`;
                
                const questionText = document.createElement('div');
                questionText.className = 'question-text';
                questionText.textContent = q.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options';

                q.options.forEach((option, optIndex) => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'option';
                    
                    if (userAnswers[index] !== null) {
                        optionDiv.classList.add('disabled');
                        if (optIndex === q.answer) {
                            optionDiv.classList.add('correct');
                        } else if (optIndex === userAnswers[index]) {
                            optionDiv.classList.add('wrong');
                        }
                    }

                    const label = document.createElement('span');
                    label.className = 'option-label';
                    label.textContent = String.fromCharCode(65 + optIndex);

                    const text = document.createElement('span');
                    text.textContent = option;

                    optionDiv.appendChild(label);
                    optionDiv.appendChild(text);
                    
                    optionDiv.onclick = () => selectAnswer(index, optIndex);
                    optionsDiv.appendChild(optionDiv);
                });

                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `feedback-${index}`;

                questionDiv.appendChild(questionNumber);
                questionDiv.appendChild(questionText);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedback);
                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(qIndex, optIndex) {
            if (userAnswers[qIndex] !== null) return;

            userAnswers[qIndex] = optIndex;
            const isCorrect = optIndex === quizData[qIndex].answer;

            // Update UI
            const card = document.querySelectorAll('.question-card')[getVisibleQuestionIndex(qIndex)];
            card.className = 'question-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong');

            const options = card.querySelectorAll('.option');
            options.forEach((opt, idx) => {
                opt.classList.add('disabled');
                if (idx === quizData[qIndex].answer) {
                    opt.classList.add('correct');
                } else if (idx === optIndex) {
                    opt.classList.add('wrong');
                }
            });

            // Show feedback
            const feedback = card.querySelector('.feedback');
            feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
            feedback.textContent = isCorrect ? 
                '✅ Correct! Well done!' : 
                `❌ Wrong! The correct answer is: ${String.fromCharCode(65 + quizData[qIndex].answer)}) ${quizData[qIndex].options[quizData[qIndex].answer]}`;

            updateStats();
        }

        function getVisibleQuestionIndex(actualIndex) {
            let visibleIndex = 0;
            for (let i = 0; i <= actualIndex; i++) {
                if (currentFilter === 'all') {
                    if (i === actualIndex) return visibleIndex;
                    visibleIndex++;
                } else if (currentFilter === 'unanswered' && userAnswers[i] === null) {
                    if (i === actualIndex) return visibleIndex;
                    visibleIndex++;
                } else if (currentFilter === 'correct' && userAnswers[i] !== null && userAnswers[i] === quizData[i].answer) {
                    if (i === actualIndex) return visibleIndex;
                    visibleIndex++;
                } else if (currentFilter === 'wrong' && userAnswers[i] !== null && userAnswers[i] !== quizData[i].answer) {
                    if (i === actualIndex) return visibleIndex;
                    visibleIndex++;
                }
            }
            return visibleIndex;
        }

        function updateStats() {
            const answered = userAnswers.filter(a => a !== null).length;
            const correct = userAnswers.filter((a, i) => a === quizData[i].answer).length;
            const wrong = answered - correct;
            const percentage = answered > 0 ? Math.round((correct / answered) * 100) : 0;
            const progress = (answered / quizData.length) * 100;

            document.getElementById('progressStat').textContent = `${answered}/${quizData.length}`;
            document.getElementById('correctStat').textContent = correct;
            document.getElementById('wrongStat').textContent = wrong;
            document.getElementById('scoreStat').textContent = percentage + '%';
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function filterQuestions(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderQuestions();
        }

        function resetQuiz() {
            if (confirm('Are you sure you want to reset the quiz? All progress will be lost.')) {
                userAnswers = new Array(quizData.length).fill(null);
                currentFilter = 'all';
                document.querySelectorAll('.filter-btn')[0].classList.add('active');
                document.querySelectorAll('.filter-btn').forEach((btn, i) => {
                    if (i > 0) btn.classList.remove('active');
                });
                renderQuestions();
                updateStats();
            }
        }

        function showResults() {
            const answered = userAnswers.filter(a => a !== null).length;
            const correct = userAnswers.filter((a, i) => a === quizData[i].answer).length;
            const wrong = answered - correct;
            const percentage = answered > 0 ? Math.round((correct / answered) * 100) : 0;

            let performance = '';
            let icon = '';
            if (percentage >= 85) {
                performance = 'Excellent! 🌟';
                icon = '🎉';
            } else if (percentage >= 70) {
                performance = 'Very Good! 👍';
                icon = '😊';
            } else if (percentage >= 54) {
                performance = 'Good! 👌';
                icon = '🙂';
            } else {
                performance = 'Need More Practice 📚';
                icon = '😐';
            }

            document.getElementById('resultIcon').textContent = icon;
            document.getElementById('resultScore').textContent = percentage + '%';
            document.getElementById('resultAnswered').textContent = answered;
            document.getElementById('resultCorrect').textContent = correct;
            document.getElementById('resultWrong').textContent = wrong;
            document.getElementById('resultPerformance').textContent = performance;
            document.getElementById('resultModal').classList.add('show');
        }

        function closeResults() {
            document.getElementById('resultModal').classList.remove('show');
        }

        // Initialize
        renderQuestions();
        updateStats();
    </script>
